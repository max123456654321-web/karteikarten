    --shadow-md: 0 8px 24px rgba(107, 90, 58, .12), 0 2px 6px rgba(107, 90, 58, .08);

    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;

    display: flex; align-items: center; gap: 8px;

  header.topbar h1 .logo-dot {

    background: linear-gradient(135deg, var(--accent), var(--good));

    padding: 10px 16px; cursor: pointer; font-weight: 600; border-radius: 12px;

    border: 2px dashed var(--accent);
    border-radius: var(--radius);

    text-align: center;
    color: var(--ink-soft);

  .card-row-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .row-fav-btn { background: none; border: none; padding: 2px; font-size: 1rem; line-height: 1; cursor: pointer; flex-shrink: 0; }

    border: none; cursor: pointer; font-family: inherit;
  }
  .row-defer-badge:active { transform: scale(.94); }
  .row-del-btn {

  .session-summary h2 { margin-top: 8px; }
  .session-summary .stat-row { display: flex; justify-content: center; gap: 32px; margin: 24px 0; }
  .session-summary .stat { display: flex; flex-direction: column; }
  .session-summary .stat .num { font-size: 2rem; font-weight: 800; color: var(--accent-dark); }
  .session-summary .stat .label { color: var(--ink-soft); font-size: .85rem; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,42,38,.45);
    display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 50;
    backdrop-filter: blur(2px);

<body>
<div id="app"></div>
<div id="toast-container"></div>

<script>
/* ======================================================================
   Karteikarten-App — Anki-.apkg-Reader mit SM-2-Wiederholungsalgorithmus
   Reines HTML/CSS/JS, keine Build-Schritte, keine Server-Komponente.
   ====================================================================== */

/* ---------------------------------------------------------------------
   IndexedDB-Zugriffsschicht
   Object Stores:
     decks: { id, name, importDate, newPerDay, newIntroducedToday, newIntroducedDate }
     cards: { id, deckId, front, back, ease, interval, reps, due, lapses, firstReviewDone, created }
   --------------------------------------------------------------------- */
const DB_NAME = 'karteikartenDB';
const DB_VERSION = 1;
let dbPromise = null;

function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('decks')) {
        db.createObjectStore('decks', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('cards')) {
        const store = db.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
        store.createIndex('deckId', 'deckId', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}

function tx(storeNames, mode) {
  return openDB().then(db => db.transaction(storeNames, mode));
}

function reqToPromise(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const Store = {
  async addDeck(deck) {
    const t = await tx(['decks'], 'readwrite');
    const id = await reqToPromise(t.objectStore('decks').add(deck));
    return id;
  },
  async updateDeck(deck) {
    const t = await tx(['decks'], 'readwrite');
    await reqToPromise(t.objectStore('decks').put(deck));
  },
  async getDeck(id) {
    const t = await tx(['decks'], 'readonly');
    return reqToPromise(t.objectStore('decks').get(id));
  },
  async getAllDecks() {
    const t = await tx(['decks'], 'readonly');
    return reqToPromise(t.objectStore('decks').getAll());
  },
  async deleteDeck(id) {
    const t = await tx(['decks', 'cards'], 'readwrite');
    t.objectStore('decks').delete(id);
    const idx = t.objectStore('cards').index('deckId');
    const cursorReq = idx.openCursor(IDBKeyRange.only(id));
    await new Promise((resolve, reject) => {
      cursorReq.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) { cursor.delete(); cursor.continue(); }
        else resolve();
      };
      cursorReq.onerror = () => reject(cursorReq.error);
    });
  },
  async findDeckByName(name) {
    const decks = await this.getAllDecks();
    return decks.find(d => d.name === name);
  },
  async addCards(cards) {
    const t = await tx(['cards'], 'readwrite');
    const store = t.objectStore('cards');
    for (const c of cards) store.add(c);
    await new Promise((resolve, reject) => {
      t.oncomplete = resolve;
      t.onerror = () => reject(t.error);
    });
  },
  async getCardsForDeck(deckId) {
    const t = await tx(['cards'], 'readonly');
    const idx = t.objectStore('cards').index('deckId');
    return reqToPromise(idx.getAll(IDBKeyRange.only(deckId)));
  },
  async updateCard(card) {
    const t = await tx(['cards'], 'readwrite');
    await reqToPromise(t.objectStore('cards').put(card));
  },
  async deleteCard(id) {
    const t = await tx(['cards'], 'readwrite');
    await reqToPromise(t.objectStore('cards').delete(id));
  }
};

/* ---------------------------------------------------------------------
   .apkg-Import: ZIP entpacken, SQLite lesen, Notiztypen anwenden
   --------------------------------------------------------------------- */
let SQL = null;
async function getSQL() {
  if (SQL) return SQL;
  SQL = await initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
  });
  return SQL;
}

async function parseApkg(file) {
  const zip = await JSZip.loadAsync(file);

  let dbFile = zip.file('collection.anki21') || zip.file('collection.anki2');
  if (!dbFile) {
    if (zip.file('collection.anki21b')) {
      throw new Error('Diese Datei nutzt ein neueres Anki-Format, das noch nicht unterstützt wird');
    }
    throw new Error('Keine gültige Anki-Sammlung in dieser Datei gefunden');
  }

  const dbBytes = await dbFile.async('uint8array');
  const sql = await getSQL();
  const db = new sql.Database(dbBytes);

  // Medien-Zuordnung (Nummer -> Dateiname) laden, falls vorhanden
  let mediaMap = {};
  const mediaFile = zip.file('media');
  if (mediaFile) {
    try {
      mediaMap = JSON.parse(await mediaFile.async('text'));
    } catch (e) { mediaMap = {}; }
  }
  // Object-URLs für Mediendateien vorbereiten (Nummer -> blob-URL)
  const mediaUrls = {};
  for (const [num, filename] of Object.entries(mediaMap)) {
    const entry = zip.file(num);
    if (entry) {
      try {
        const blob = await entry.async('blob');
        mediaUrls[filename] = URL.createObjectURL(blob);
      } catch (e) { /* Mediendatei defekt/fehlt: ignorieren */ }
    }
  }

  const colRes = db.exec('SELECT models FROM col LIMIT 1');
  if (!colRes.length) throw new Error('Keine Modell-Informationen in der Datenbank gefunden');
  const modelsJson = colRes[0].values[0][0];
  const models = JSON.parse(modelsJson);

  const notesRes = db.exec('SELECT id, mid, flds FROM notes');
  const notesById = {};
  if (notesRes.length) {
    for (const row of notesRes[0].values) {
      notesById[row[0]] = { mid: row[1], flds: row[2] };
    }
  }

  const cardsRes = db.exec('SELECT id, nid, ord FROM cards');
  const cardRows = cardsRes.length ? cardsRes[0].values : [];

  const parsedCards = [];
  for (const [cardId, nid, ord] of cardRows) {
    const note = notesById[nid];
    if (!note) continue;
    const model = models[note.mid];
    if (!model) continue;

    const fieldNames = model.flds.map(f => f.name);
    const fieldValues = note.flds.split('\x1f');
    const fieldsMap = {};
    fieldNames.forEach((name, i) => { fieldsMap[name] = fieldValues[i] || ''; });

    // MC-Karte Shuffle: Optionen werden nicht statisch gerendert, sondern bei
    // jedem Anzeigen live gemischt (siehe renderMcCard). Deshalb hier nur die
    // Rohfelder mitnehmen statt fertiges Front-/Back-HTML zu erzeugen.
    if (isMcShuffleNote(fieldsMap)) {
      parsedCards.push({
        front: '', back: '', css: '',
        mcData: {
          frage: insertMedia(fieldsMap['Frage'] || '', mediaUrls),
          options: ['A', 'B', 'C', 'D'].map(f => insertMedia(fieldsMap[f] || '', mediaUrls)),
          correctIndex: parseInt(fieldsMap['AntwortNr'], 10) || 0,
          richtigText: insertMedia(fieldsMap['RichtigText'] || '', mediaUrls),
          erklaerung: insertMedia(fieldsMap['Erklaerung'] || '', mediaUrls)
        }
      });
      continue;
    }

    const isClozeModel = model.type === 1;
    const tmpl = isClozeModel ? model.tmpls[0] : model.tmpls[ord];
    if (!tmpl) continue;

    let frontHtml = renderTemplate(tmpl.qfmt, fieldsMap, ord, true, '');
    let backHtml = renderTemplate(tmpl.afmt, fieldsMap, ord, false, frontHtml);

    frontHtml = insertMedia(frontHtml, mediaUrls);
    backHtml = insertMedia(backHtml, mediaUrls);

    // Die CSS des Notiztyps wird mitgenommen, damit z.B. Multiple-Choice-Layouts,
    // Farben und Abstände wie im echten Anki dargestellt werden können.
    parsedCards.push({ front: frontHtml, back: backHtml, css: model.css || '' });
  }

  db.close();
  return parsedCards;
}

function insertMedia(html, mediaUrls) {
  return html.replace(/src="([^"]+)"/g, (match, src) => {
    if (mediaUrls[src]) return `src="${mediaUrls[src]}"`;
    return match; // Bild fehlt: Original-Pfad belassen, kein Absturz
  });
}

// Erkennt Notizen vom Typ "MC-Karte Shuffle" anhand ihrer Felder (nicht am
// Notiztyp-Namen, da der beim Export leicht abweichen kann).
function isMcShuffleNote(fieldsMap) {
  return ['Frage', 'A', 'B', 'C', 'D', 'AntwortNr'].every(f => f in fieldsMap);
}

/* ---------------------------------------------------------------------
   Template-Rendering (Ankis {{Feld}}, {{#Feld}}, {{^Feld}}, {{cloze:Feld}})
   --------------------------------------------------------------------- */
function renderTemplate(tmplStr, fieldsMap, ord, isFront, frontSideHtml) {
  let out = tmplStr || '';

  // {{FrontSide}} nur auf der Rückseite relevant
  out = out.replace(/\{\{FrontSide\}\}/g, frontSideHtml || '');

  // Bedingte Abschnitte: {{#Feld}}...{{/Feld}} (nur wenn Feld nicht leer)
  let changed = true;
  let guard = 0;
  while (changed && guard < 20) {
    changed = false;
    guard++;
    out = out.replace(/\{\{#([^}#^\/]+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (m, field, inner) => {
      changed = true;
      const val = (fieldsMap[field.trim()] || '').trim();
      return val ? inner : '';
    });
    out = out.replace(/\{\{\^([^}#^\/]+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (m, field, inner) => {
      changed = true;
      const val = (fieldsMap[field.trim()] || '').trim();
      return val ? '' : inner;
    });
  }

  // Cloze-Platzhalter: {{cloze:Feld}}
  out = out.replace(/\{\{cloze:([^}]+)\}\}/g, (m, field) => {
    const text = fieldsMap[field.trim()] || '';
    return renderCloze(text, ord, isFront);
  });

  // Normale Feld-Platzhalter (inkl. Filter wie {{type:Feld}}, Filter wird ignoriert)
  out = out.replace(/\{\{([^#\^\/][^}]*)\}\}/g, (m, expr) => {
    const parts = expr.split(':');
    const field = parts[parts.length - 1].trim();
    return fieldsMap[field] !== undefined ? fieldsMap[field] : '';
  });

  return out;
}

function renderCloze(text, ord, isFront) {
  const targetNum = ord + 1;
  return text.replace(/\{\{c(\d+)::([\s\S]*?)(?:::([\s\S]*?))?\}\}/g, (m, numStr, content, hint) => {
    const num = parseInt(numStr, 10);
    if (num === targetNum) {
      if (isFront) return hint ? `[${hint}]` : '[...]';
      return `<span class="cloze-answer">${content}</span>`;
    }
    return content;
  });
}

// Beschränkt die vom Notiztyp mitgelieferte CSS auf unseren Karten-Wrapper,
// damit sie nicht den Rest der App beeinflusst. ".card" ist Ankis Konvention
// für den äußeren Karten-Container und wird direkt auf die Wrapper-Klasse gemappt.
// (Einfache, regelbasierte Lösung — deckt die typische flache CSS-Struktur von
// Anki-Notiztypen ab; @media-Bedingungen werden dabei unverändert durchgereicht.)
function scopeCss(css, scopeClass) {
  if (!css) return '';
  return css.replace(/([^{}]+)\{([^{}]*)\}/g, (match, selectorPart, body) => {
    const trimmed = selectorPart.trim();
    if (trimmed.startsWith('@')) return match;
    const scoped = trimmed.split(',').map(sel => {
      sel = sel.trim();
      if (sel === '.card') return `.${scopeClass}`;
      return `.${scopeClass} ${sel}`;
    }).join(', ');
    return `${scoped} { ${body} }`;
  });
}

/* ---------------------------------------------------------------------
   Wiederholungsalgorithmus mit Lernschritten
   ---------------------------------------------------------------------
   Vier Bewertungen + ein "Später"-Button (siehe deferCard).
   - LERNPHASE (neue + zurückgestufte Karten, interval < 1 Tag):
       Nochmal = 2 Min, Schwer = 6 Min, Gut = 15 Min, Leicht = 1 Tag (graduiert).
   - WIEDERHOLPHASE (interval >= 1 Tag):
       Nochmal = 2 Min, Schwer = 6 Min (beide zurück in die Lernphase),
       Gut = HÄLT das aktuelle Intervall (wird nie größer/kleiner),
       Leicht = ERHÖHT: verdoppeln, aber gedeckelt bei 4 Tagen (1->2->4->4...).
   Nur Leicht vergrößert das Intervall; Gut hält es konstant. Karten in der
   Lernphase kommen INNERHALB der Sitzung nach ihren Minuten wieder (pickNextCard).
   card.mastered = zuletzt mindestens Gut bewertet (true) bzw. Nochmal/Schwer/neu
   (false) — steuert, wann zurückgestellte Karten wieder freigegeben werden.
   Alles arbeitet nur mit vorhandenen Kartenfeldern -> bestehende Stapel ohne
   Neu-Import kompatibel.
   --------------------------------------------------------------------- */
const ONE_DAY_MS = 24 * 60 * 60 * 1000;
const STEP_AGAIN_MS = 2 * 60 * 1000;    // 2 Minuten
const STEP_HARD_MS  = 6 * 60 * 1000;    // 6 Minuten
const STEP_GOOD_MS  = 15 * 60 * 1000;   // 15 Minuten
const LEICHT_CAP_DAYS = 4;              // Leicht deckelt bei 4 Tagen

// Ist die Karte noch in der Lernphase (Minuten-Schritte)?
function isLearningCard(card) {
  return !card.firstReviewDone || (card.interval || 0) < 1;
}

// Die vier nächsten Intervalle (in Tagen, ggf. Bruchteile) für die Karte, OHNE
// Mutation — für die Anzeige auf den Buttons und als Grundlage für scheduleCard.
function previewSchedule(card) {
  if (isLearningCard(card)) {
    return {
      1: STEP_AGAIN_MS / ONE_DAY_MS,   // Nochmal: 2 Min
      3: STEP_HARD_MS / ONE_DAY_MS,    // Schwer: 6 Min
      4: STEP_GOOD_MS / ONE_DAY_MS,    // Gut: 15 Min
      5: 1,                            // Leicht: 1 Tag (graduiert)
    };
  }
  const iv = card.interval || 1;
  return {
    1: STEP_AGAIN_MS / ONE_DAY_MS,     // Nochmal: 2 Min
    3: STEP_HARD_MS / ONE_DAY_MS,      // Schwer: 6 Min
    4: iv,                             // Gut: Intervall bleibt gleich
    5: Math.min(LEICHT_CAP_DAYS, Math.max(2, Math.round(iv * 2))), // Leicht: verdoppeln, max 4 Tage
  };
}

// Wendet die Bewertung an. Rückgabe { learning }: true = Karte bleibt in der
// Sitzung (Minuten-Schritt, kommt gleich wieder), false = auf Tage geplant und
// verlässt die aktive Warteschlange.
function scheduleCard(card, q) {
  const now = Date.now();
  const learning = isLearningCard(card);

  if (q === 1) {                 // Nochmal -> 2 Min, zurück in die Lernphase
    if (!learning) card.lapses = (card.lapses || 0) + 1;
    card.reps = 0;
    card.mastered = false;
    card.interval = STEP_AGAIN_MS / ONE_DAY_MS;
    card.due = now + STEP_AGAIN_MS;
    return { learning: true };
  }
  if (q === 3) {                 // Schwer -> 6 Min, zurück in die Lernphase
    card.reps = 0;
    card.mastered = false;
    card.interval = STEP_HARD_MS / ONE_DAY_MS;
    card.due = now + STEP_HARD_MS;
    return { learning: true };
  }

  // Gut (4) und Leicht (5) gelten als "gekonnt"
  card.mastered = true;

  if (q === 4) {                 // Gut -> Intervall HALTEN (nie größer/kleiner)
    if (learning) {
      card.interval = STEP_GOOD_MS / ONE_DAY_MS;   // 15 Min, bleibt Lernphase
      card.due = now + STEP_GOOD_MS;
      return { learning: true };
    }
    card.reps = (card.reps || 0) + 1;
    card.due = now + Math.round((card.interval || 1) * ONE_DAY_MS); // gleiches Intervall
    return { learning: false };
  }

  // q === 5, Leicht -> ERHÖHEN (verdoppeln, max 4 Tage)
  const days = learning
    ? 1                                                              // graduiert auf 1 Tag
    : Math.min(LEICHT_CAP_DAYS, Math.max(2, Math.round((card.interval || 1) * 2)));
  card.reps = (card.reps || 0) + 1;
  card.interval = days;
  card.due = now + Math.round(days * ONE_DAY_MS);
  return { learning: false };
}

// Menschliche Kurzform eines Intervalls (in Tagen) für die Button-Anzeige.
function fmtInterval(days) {
  const mins = Math.round(days * 24 * 60);
  if (mins < 60) return mins + ' Min';
  if (mins < 60 * 24) { const h = Math.round(mins / 60); return h + ' Std'; }
  const d = Math.round(days);
  if (d < 30) return d + (d === 1 ? ' Tag' : ' Tage');
  if (d < 365) { const mo = Math.round(d / 30); return mo + ' Mon'; }
  const y = d / 365;
  return (y < 10 ? y.toFixed(1) : Math.round(y)) + ' J';
}

function newCardState() {
  return { ease: 2.5, interval: 0, reps: 0, lapses: 0, due: Date.now(), firstReviewDone: false, mastered: false, deferred: false };
}

// Fortschritts-Kennzahlen pro Stapel für die Startseite
function computeDeckStats(cards, deck) {
  const total = cards.length;
  const learned = cards.filter(c => c.firstReviewDone).length;
  const mature = cards.filter(c => c.interval >= 21).length; // "reif" wie in Anki üblich
  const newCount = total - learned;
  const progressPct = total > 0 ? Math.round((learned / total) * 100) : 0;
  const daysLeft = newCount > 0 ? Math.ceil(newCount / (deck.newPerDay || 20)) : 0;
  return { total, learned, mature, newCount, progressPct, daysLeft };
}

async function renderHome() {
  currentSession = null;
  const decks = await Store.getAllDecks();
  const today = Date.now();

  let deckItemsHtml = '';
  if (decks.length === 0) {
    deckItemsHtml = `<div class="empty-hint"><span class="empty-icon">🗂️</span>Noch keine Stapel importiert.<br>Lade eine .apkg-Datei hoch, um loszulegen.</div>`;
  } else {
    for (const deck of decks) {
      const cards = await Store.getCardsForDeck(deck.id);
      const dueCount = cards.filter(c => c.due <= today).length;
      const favCount = cards.filter(c => c.favorite).length;
      const stats = computeDeckStats(cards, deck);
      deckItemsHtml += `
        <div class="deck-card">
          <div class="deck-main">
            <div class="deck-icon">📚</div>
            <div class="deck-info">
              <div class="deck-name">${escapeHtml(deck.name)}</div>

              <div class="deck-stats">

                <div class="deck-stats-text">${stats.progressPct}% gelernt · ${stats.mature} reif${stats.daysLeft > 0 ? ` · noch ca. ${stats.daysLeft} Tag${stats.daysLeft === 1 ? '' : 'e'} bis alle neuen Karten dran waren` : ''}</div>
              </div>
            </div>
          </div>
          <div class="deck-actions">
            <button class="primary" data-action="study" data-id="${deck.id}" ${cards.length === 0 ? 'disabled' : ''}>Lernen starten</button>
            <button class="secondary" data-action="browse" data-id="${deck.id}" ${cards.length === 0 ? 'disabled' : ''}>Durchsehen</button>
            <button class="secondary" data-action="study-fav" data-id="${deck.id}" ${favCount === 0 ? 'disabled' : ''}>⭐ Favoriten (${favCount})</button>
            <button class="delete-btn" data-action="delete" data-id="${deck.id}">Löschen</button>
          </div>
        </div>`;
    }
  }

  app.innerHTML = `
    <header class="topbar"><h1><span class="logo-dot"></span>Karteikarten</h1></header>
    <main>
      <div class="import-zone" id="dropzone">
        <div class="import-icon">📁</div>
        <div>.apkg-Datei hierher ziehen</div>
        <button class="primary" id="import-btn">Datei auswählen</button>
        <input type="file" id="file-input" accept=".apkg">
      </div>
      <div class="deck-list">${deckItemsHtml}</div>
    </main>
  `;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  document.getElementById('import-btn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) handleImport(e.target.files[0]);
  });
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleImport(e.dataTransfer.files[0]);
  });

  app.querySelectorAll('[data-action="study"]').forEach(btn => {
    btn.addEventListener('click', () => startStudySession(parseInt(btn.dataset.id, 10)));
  });
  app.querySelectorAll('[data-action="browse"]').forEach(btn => {
    btn.addEventListener('click', () => startBrowseSession(parseInt(btn.dataset.id, 10)));
  });
  app.querySelectorAll('[data-action="study-fav"]').forEach(btn => {
    btn.addEventListener('click', () => startFavoritesSession(parseInt(btn.dataset.id, 10)));
  });
  app.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => confirmDeleteDeck(parseInt(btn.dataset.id, 10)));
  });
}

}

  const deck = await Store.getDeck(deckId);
  showModal({
    title: 'Stapel löschen?',
    body: `Möchtest du "${escapeHtml(deck.name)}" wirklich löschen? Der gesamte Lernfortschritt geht verloren.`,
    actions: [
      { label: 'Abbrechen', class: 'secondary' },
      { label: 'Löschen', class: 'primary', danger: true, onClick: async () => {

          closeModal();
          renderHome();
        } }

let modalRoot = null;
function showModal({ title, body, actions }) {
  closeModal();
  modalRoot = document.createElement('div');
  modalRoot.className = 'modal-overlay';
  modalRoot.innerHTML = `
    <div class="modal-box">
      <h3>${title}</h3>
      <div>${body}</div>
      <div class="modal-actions"></div>
    </div>`;
  const actionsWrap = modalRoot.querySelector('.modal-actions');
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = a.class || 'secondary';
    btn.textContent = a.label;
    btn.addEventListener('click', () => {

}
function closeModal() {
  if (modalRoot) { modalRoot.remove(); modalRoot = null; }
}

/* ---------------------------------------------------------------------
   Import-Ablauf
   --------------------------------------------------------------------- */
async function handleImport(file) {
  if (!file.name.toLowerCase().endsWith('.apkg')) {
    showToast('Bitte eine .apkg-Datei auswählen');
    return;
  }
  showToast('Importiere „' + file.name + '“ …');
  const deckName = file.name.replace(/\.apkg$/i, '');

  let parsedCards;
  try {
    parsedCards = await parseApkg(file);
  } catch (err) {
    showToast('Fehler beim Import: ' + err.message);
    return;
  }

  if (parsedCards.length === 0) {
    showToast('Keine Karten in dieser Datei gefunden');
    return;
  }

  const existing = await Store.findDeckByName(deckName);
  if (existing) {
    showModal({
      title: 'Stapel existiert bereits',
      body: `Ein Stapel namens "${escapeHtml(deckName)}" existiert schon. Möchtest du ihn überschreiben oder als neuen Stapel anlegen?`,
      actions: [
        { label: 'Abbrechen', class: 'secondary' },
        { label: 'Als neu anlegen', class: 'secondary', onClick: async () => {
            closeModal();
            await saveImportedDeck(deckName + ' (neu)', parsedCards);
          } },
        { label: 'Überschreiben', class: 'primary', onClick: async () => {
            closeModal();
            await Store.deleteDeck(existing.id);
            await saveImportedDeck(deckName, parsedCards);
          } }
      ]
    });
  } else {
    await saveImportedDeck(deckName, parsedCards);
  }
}

async function saveImportedDeck(name, parsedCards) {
  const deckId = await Store.addDeck({
    name, importDate: Date.now(), newPerDay: 20,
    newIntroducedToday: 0, newIntroducedDate: null
  });
  const now = Date.now();
  const cards = parsedCards.map(c => ({
    deckId, front: c.front, back: c.back, css: c.css || '', mcData: c.mcData || null,
    ease: 2.5, interval: 0, reps: 0, lapses: 0, favorite: false,
    due: now, firstReviewDone: false, created: now
  }));
  await Store.addCards(cards);
  showToast(`„${name}“ importiert: ${cards.length} Karten`);
  renderHome();
}

/* ---------------------------------------------------------------------
   Lern-Sitzung
   ---------------------------------------------------------------------
   Die Warteschlange arbeitet nach Fälligkeits-Zeitpunkt (due):
   - Karten in der Lernphase bekommen eine due in wenigen Minuten (2/6/15)
     und tauchen INNERHALB der Sitzung wieder auf, sobald ihre Zeit um ist —
     verschachtelt mit neuen Karten, nicht erst nach allen neuen.
   - Neue Karten werden nachgeschoben, solange nicht zu viele gleichzeitig in
     der Lernphase "in Arbeit" sind (batchSize = deck.newPerDay als Obergrenze
     der gleichzeitig offenen neuen Karten, KEIN Tageslimit).
   - Ist heute nichts fällig, kann man trotzdem VORAUSLERNEN: alle noch nicht
     fälligen Wiederholkarten, sortiert nach Priorität (am schlechtesten
     gelernte zuerst). So endet "Lernen starten" nie ins Leere.
   - ZURÜCKGESTELLTE Karten (card.deferred, per "Später"-Button) werden komplett
     ausgeblendet und erst wieder eingespielt, wenn ALLE anderen (nicht
     zurückgestellten) Karten mindestens einmal Gut/Leicht bewertet wurden
     (card.mastered) — siehe releaseIfReady.
   --------------------------------------------------------------------- */
async function startStudySession(deckId) {
  const deck = await Store.getDeck(deckId);
  const allCards = await Store.getCardsForDeck(deckId);
  const now = Date.now();
  const todayStr = new Date().toDateString();

  if (deck.newIntroducedDate !== todayStr) {
    deck.newIntroducedDate = todayStr;
    deck.newIntroducedToday = 0;
    await Store.updateDeck(deck);
  }

  if (allCards.length === 0) {
    showToast('Dieser Stapel enthält keine Karten');
    return;
  }

  // Zurückgestellte Karten kommen zunächst in eine eigene Ablage.
  const deferredPool = allCards.filter(c => c.deferred);
  const activeCards = allCards.filter(c => !c.deferred);

  // Heute fällige, graduierte Wiederholkarten
  const reviewPool = shuffle(activeCards.filter(c => c.firstReviewDone && (c.interval || 0) >= 1 && c.due <= now));
  // Brandneue Karten (noch nie gelernt)
  const newPool = shuffle(activeCards.filter(c => !c.firstReviewDone));
  // Schon fällige Lernkarten (z.B. aus einer früheren Sitzung zurückgestuft)
  const dueLearning = activeCards.filter(c => c.firstReviewDone && (c.interval || 0) < 1 && c.due <= now);
  // Noch nicht fällige Wiederholkarten für das Vorauslernen. Priorität:
  // mehr Nochmal/Schwer (lapses) zuerst, dann kleinstes Intervall, dann due.
  const aheadPool = activeCards
    .filter(c => c.firstReviewDone && (c.interval || 0) >= 1 && c.due > now)
    .sort((a, b) => (b.lapses || 0) - (a.lapses || 0) || (a.interval || 0) - (b.interval || 0) || a.due - b.due);

  const batchSize = deck.newPerDay || 20;
  const plannedIds = new Set([...reviewPool, ...newPool, ...dueLearning].map(c => c.id));

  if (plannedIds.size === 0 && aheadPool.length === 0 && deferredPool.length === 0) {
    showToast('Keine Karten fällig — gut gemacht!');
    return;
  }

  currentSession = {
    deck, batchSize,
    learning: dueLearning.slice(),   // schon fällige Lernkarten sofort in Arbeit
    newPool, reviewPool, aheadPool,
    deferredPool, activeCards,
    deferredThisSession: new Set(),  // in DIESER Sitzung zurückgestellt (nicht sofort wieder freigeben)
    plannedIds, masteredIds: new Set(),
    studiedIds: new Set(), againCount: 0, goodOrBetterCount: 0, deferredCount: 0,
    studyAheadActive: plannedIds.size === 0,   // ohne fällige Karten direkt voraus
    current: null,
  };

  // Sind schon alle aktiven Karten gekonnt (z.B. Wiederholsitzung), sofort
  // zurückgestellte Karten freigeben.
  releaseIfReady(currentSession);
  renderStudyView();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Baut Front-/Back-HTML für eine MC-Karte-Shuffle-Karte. Die vier Optionen
// werden per Fisher-Yates neu gemischt und A-D neu beschriftet; da diese
// Funktion nur einmal pro Aufruf von flashcardMarkup läuft (also einmal pro
// "Ansehen" der Karte), bleibt die Reihenfolge zwischen Vorder- und Rückseite
// derselben Ansicht konsistent, ändert sich aber beim nächsten Anzeigen neu.
function renderMcCard(mcData) {
  const order = shuffle([0, 1, 2, 3]); // Position -> ursprünglicher Options-Index
  const letters = ['A', 'B', 'C', 'D'];

  let frontOptionsHtml = '';
  let backOptionsHtml = '';
  order.forEach((origIdx, pos) => {
    const letter = letters[pos];
    const text = mcData.options[origIdx] || '';
    const isCorrect = origIdx === mcData.correctIndex;
    frontOptionsHtml += `<div class="mc-option"><span class="mc-badge">${letter}</span><span class="mc-option-text">${text}</span></div>`;
    backOptionsHtml += `<div class="mc-option${isCorrect ? ' mc-correct' : ''}"><span class="mc-badge">${letter}</span><span class="mc-option-text">${text}</span></div>`;
  });

  const front = `<div class="mc-question">${mcData.frage}</div><div class="mc-options">${frontOptionsHtml}</div>`;
  const back = `
    <div class="mc-options">${backOptionsHtml}</div>
    ${mcData.richtigText ? `<div class="mc-correct-box">Richtige Antwort: ${mcData.richtigText}</div>` : ''}
    ${mcData.erklaerung ? `<div class="mc-explanation">${mcData.erklaerung}</div>` : ''}
  `;
  return { front, back };
}

// Gemeinsames Karten-Markup für Lern- und Durchsehen-Ansicht.
// Bindet die (auf den Wrapper beschränkte) Notiztyp-CSS ein, damit z.B.
// Multiple-Choice-Layouts, Farben und Abstände wie im echten Anki aussehen.
function flashcardMarkup(card) {
  if (card.mcData) {
    const { front, back } = renderMcCard(card.mcData);
    return `
      <div id="card-front-wrap">
        <div class="side-label">Vorderseite</div>
        <div id="card-front" class="anki-card-scope">${front}</div>
      </div>
      <div id="card-back-wrap" style="display:none">
        <div class="side-label">Rückseite</div>
        <div id="card-back" class="anki-card-scope">${back}</div>
      </div>
    `;
  }
  const scopedCss = scopeCss(card.css || '', 'anki-card-scope');
  return `
    <style>${scopedCss}</style>
    <div id="card-front-wrap">
      <div class="side-label">Vorderseite</div>
      <div id="card-front" class="anki-card-scope">${card.front}</div>
    </div>
    <div id="card-back-wrap" style="display:none">
      <div class="side-label">Rückseite</div>
      <div id="card-back" class="anki-card-scope">${card.back}</div>
    </div>
  `;
}

// Entfernt eine Karte aus allen Pools (nach Objekt-Identität).
function removeFromPools(s, card) {
  ['newPool', 'reviewPool', 'aheadPool', 'learning'].forEach(k => {
    const i = s[k].indexOf(card);
    if (i !== -1) s[k].splice(i, 1);
  });
}

// Gibt zurückgestellte Karten wieder frei, sobald ALLE aktiven (nicht
// zurückgestellten) Karten mindestens einmal Gut/Leicht bewertet wurden
// (card.mastered). Karten, die in DIESER Sitzung zurückgestellt wurden, bleiben
// bis zur nächsten Sitzung ausgeblendet (verhindert sofortiges Wiedervorschlagen).
// Rückgabe: true, wenn dadurch neue Karten in die Warteschlange kamen.
function releaseIfReady(s) {
  if (!s.deferredPool.length) return false;
  if (s.activeCards.some(c => !c.mastered)) return false;
  const releasable = s.deferredPool.filter(c => !s.deferredThisSession.has(c.id));
  if (!releasable.length) return false;

  const now = Date.now();
  s.deferredPool = s.deferredPool.filter(c => s.deferredThisSession.has(c.id));
  releasable.forEach(card => {
    card.deferred = false;
    Store.updateCard(card).catch(() => {});
    s.activeCards.push(card);
    s.plannedIds.add(card.id);
    if (!card.firstReviewDone) {
      s.newPool.push(card);
    } else {
      card.due = now; // ab jetzt fällig, damit sie wirklich wieder drankommt
      if ((card.interval || 0) < 1) s.learning.push(card); else s.reviewPool.push(card);
    }
  });
  showToast(releasable.length === 1 ? 'Zurückgestellte Karte ist wieder dran' : `${releasable.length} zurückgestellte Karten sind wieder dran`);
  return true;
}

// Wählt die nächste anzuzeigende Karte nach Fälligkeit/Priorität, OHNE die
// Pools zu verändern. Reihenfolge:
//  1. fällige Lernkarte (due <= jetzt) — hat Vorrang, so tauchen Nochmal-Karten
//     nach ihren 2/6/15 Minuten sofort wieder auf
//  2. heute fällige Wiederholkarte
//  3. neue Karte (nur solange < batchSize gleichzeitig in der Lernphase)
//  4. Lernkarte, deren Minuten noch nicht ganz um sind (etwas früher zeigen
//     statt Leerlauf)
//  5. übrige neue Karte (über der Obergrenze, wenn sonst nichts wartet)
//  6. Vorauslernen: nächste Karte aus dem Prioritäts-Pool
function pickNextCard(s) {
  const now = Date.now();
  if (s.learning.length) s.learning.sort((a, b) => a.due - b.due);

  const ready = s.learning.find(c => c.due <= now);
  if (ready) return ready;

  if (s.reviewPool.length) return s.reviewPool[0];
  if (s.newPool.length && s.learning.length < s.batchSize) return s.newPool[0];
  if (s.learning.length) return s.learning[0];
  if (s.newPool.length) return s.newPool[0];
  // Vorauslernen nur, wenn ausdrücklich aktiviert (direkt beim Start ohne
  // fällige Karten, oder per Button in der Zusammenfassung) — sonst endet die
  // Sitzung nach der fälligen Arbeit ganz normal.
  if (s.studyAheadActive && s.aheadPool.length) return s.aheadPool[0];
  return null;
}

function advanceToNextCard(s) {
  const card = pickNextCard(s);
  if (!card) { s.current = null; return false; }
  removeFromPools(s, card);
  s.current = card;
  return true;
}

function renderStudyView() {
  const s = currentSession;
  if (!s) return;

  if (!s.current) {
    if (!advanceToNextCard(s)) {
      // Nichts mehr aktiv — evtl. zurückgestellte Karten freigeben, sonst Ende.
      if (releaseIfReady(s) && advanceToNextCard(s)) { /* weiter mit freigegebener Karte */ }
      else { renderSessionSummary(); return; }
    }
  }
  const card = s.current;

  // Fortschritt: bei geplanter Arbeit füllt sich der Balken nach gekonnten
  // (mind. einmal Gut/Leicht) Karten. Beim reinen Vorauslernen zeigt er den
  // Anteil der schon durchgesehenen Karten.
  const plannedTotal = s.plannedIds.size;
  let doneCount, denom, aheadHint;
  if (plannedTotal > 0 && !s.studyAheadActive) {
    doneCount = Math.min(s.masteredIds.size, plannedTotal);
    denom = plannedTotal;
    aheadHint = '';
  } else {
    doneCount = s.studiedIds.size;
    denom = s.studiedIds.size + s.aheadPool.length + s.learning.length + 1;
    aheadHint = ' · Vorauslernen';
  }
  const progressPct = Math.min(100, Math.round((doneCount / Math.max(1, denom)) * 100));

  const pv = previewSchedule(card);

  app.innerHTML = `
    <header class="topbar">
      <button class="back-btn" id="exit-session">Beenden</button>
      <h1 style="font-size:1.1rem">${escapeHtml(s.deck.name)}</h1>
      <span style="width:60px"></span>
    </header>
    <main>
      <div class="progress-wrap">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div>
        <div class="progress-count">${doneCount} / ${denom}${aheadHint}</div>
      </div>
      <div class="card-area">
        <button class="card-del-btn" id="card-del" title="Diese Karte dauerhaft löschen">🗑</button>
        <button class="card-fav-btn" id="fav-toggle">${card.favorite ? '⭐' : '☆'}</button>
        <div class="flashcard" id="flashcard">${flashcardMarkup(card)}</div>
      </div>
      <div class="tap-hint" id="tap-hint">Doppeltipp zum Umdrehen</div>
      <div class="answer-buttons answer-buttons-5" id="answer-buttons" style="display:none">
        <button class="btn-defer" id="btn-defer" title="Fürs Erste zurückstellen — kommt erst wieder, wenn alle anderen Karten sitzen">Später<span class="sub">zurück</span></button>
        <button class="btn-again" data-q="1">Nochmal<span class="sub">${fmtInterval(pv[1])}</span></button>
        <button class="btn-hard" data-q="3">Schwer<span class="sub">${fmtInterval(pv[3])}</span></button>
        <button class="btn-good" data-q="4">Gut<span class="sub">${fmtInterval(pv[4])}</span></button>
        <button class="btn-easy" data-q="5">Leicht<span class="sub">${fmtInterval(pv[5])}</span></button>
      </div>
    </main>
  `;

  document.getElementById('exit-session').addEventListener('click', () => {
    currentSession = null;
    renderHome();
  });

  document.getElementById('card-del').addEventListener('click', confirmDeleteCurrentStudyCard);

  document.getElementById('fav-toggle').addEventListener('click', async () => {
    card.favorite = !card.favorite;
    await Store.updateCard(card);
    document.getElementById('fav-toggle').textContent = card.favorite ? '⭐' : '☆';
  });

  const flashcard = document.getElementById('flashcard');
  let lastTap = 0;
  flashcard.addEventListener('click', () => {
    const now = Date.now();
    if (now - lastTap < 350) {
      toggleCardFace();
    }
    lastTap = now;
  });

  document.querySelectorAll('#answer-buttons button[data-q]').forEach(btn => {
    btn.addEventListener('click', () => rateCard(parseInt(btn.dataset.q, 10)));
  });
  document.getElementById('btn-defer').addEventListener('click', deferCard);

  typesetMath();
}

// Doppeltipp zeigt NUR die Rückseite (Vorderseite wird ausgeblendet, kein
// Scrollen nötig, um die Bewertungsbuttons zu erreichen) — erneuter
// Doppeltipp zeigt wieder nur die Vorderseite.
// (wird sowohl in der Lern- als auch in der Durchsehen-Ansicht verwendet)
function toggleCardFace() {
  const frontWrap = document.getElementById('card-front-wrap');
  const backWrap = document.getElementById('card-back-wrap');
  const answerButtons = document.getElementById('answer-buttons');
  const tapHint = document.getElementById('tap-hint');
  if (!backWrap) return;
  const isRevealed = backWrap.style.display === 'block';
  if (isRevealed) {
    backWrap.style.display = 'none';
    if (frontWrap) frontWrap.style.display = '';
    if (answerButtons) answerButtons.style.display = 'none';
    if (tapHint) tapHint.style.display = 'block';
  } else {
    backWrap.style.display = 'block';
    if (frontWrap) frontWrap.style.display = 'none';
    if (answerButtons) answerButtons.style.display = 'grid';
    if (tapHint) tapHint.style.display = 'none';
  }
  typesetMath();
}

function typesetMath() {
  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise([document.getElementById('flashcard')]).catch(() => {});
  }
}

/* ---------------------------------------------------------------------
   Stapel durchsehen: alle Karten frei anschauen, unabhängig von SM-2
   --------------------------------------------------------------------- */
let browseSession = null;

async function startBrowseSession(deckId) {
  const deck = await Store.getDeck(deckId);
  const cards = await Store.getCardsForDeck(deckId);
  if (cards.length === 0) {
    showToast('Dieser Stapel enthält keine Karten');
    return;
  }
  browseSession = { deck, cards, index: 0, mode: 'single', favoritesMode: false };
  renderBrowseView();
}

// Favoriten lernen: einfaches Durchgehen NUR der favorisierten Karten,
// komplett unabhängig vom SM-2-Algorithmus (keine Bewertungsbuttons, keine
// Änderung an ease/interval/due) und unabhängig davon, ob eine Karte im
// normalen Lernmodus schon "fällig" ist oder nicht — Favoriten sind immer
// lernbar. Nutzt dieselbe Durchsehen-Infrastruktur (Einzel-/Kachel-/Listenansicht).
async function startFavoritesSession(deckId) {
  const deck = await Store.getDeck(deckId);
  const cards = await Store.getCardsForDeck(deckId);
  const favCards = cards.filter(c => c.favorite);
  if (favCards.length === 0) {
    showToast('Keine Favoriten in diesem Stapel');
    return;
  }
  browseSession = { deck, cards: favCards, index: 0, mode: 'single', favoritesMode: true };
  renderBrowseView();
}

// Kurzvorschau einer Karte für Kachel-/Listenansicht: Klartext (HTML-Tags
// entfernt) plus erstes Bild, falls vorhanden.
function getCardPreview(card) {
  const html = card.mcData ? card.mcData.frage : (card.front || '');
  const imgMatch = /<img[^>]+src="([^"]*)"/.exec(html);
  const text = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  return { text: text || '(ohne Text)', imgSrc: imgMatch ? imgMatch[1] : null };
}

function renderBrowseView() {
  const b = browseSession;
  if (!b) return;
  if (b.mode === 'grid') { renderBrowseGridView(); return; }
  if (b.mode === 'list') { renderBrowseListView(); return; }
  renderBrowseSingleView();
}

function browseHeaderHtml(activeMode) {
  return `
    <header class="topbar">
      <button class="back-btn" id="exit-browse">Fertig</button>
      <h1 style="font-size:1.1rem">${escapeHtml(browseSession.deck.name)}${browseSession.favoritesMode ? ' ⭐' : ''}</h1>
      <div class="browse-mode-switch">
        <button class="mode-btn ${activeMode === 'single' ? 'active' : ''}" data-mode="single" title="Einzelkarten">🔲</button>
        <button class="mode-btn ${activeMode === 'grid' ? 'active' : ''}" data-mode="grid" title="Kacheln">▦</button>
        <button class="mode-btn ${activeMode === 'list' ? 'active' : ''}" data-mode="list" title="Liste">☰</button>
      </div>
    </header>`;
}

function wireBrowseHeader() {
  document.getElementById('exit-browse').addEventListener('click', () => {
    browseSession = null;
    renderHome();
  });
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => { browseSession.mode = btn.dataset.mode; renderBrowseView(); });
  });
}

// Toggle-Buttons für Favoriten in Kachel-/Listenansicht: Klick auf den Stern
// schaltet nur den Favoritenstatus um (stopPropagation), Klick daneben
// springt in die Einzelkartenansicht an dieser Stelle.
function wireCardPreviewInteractions(itemSelector) {
  document.querySelectorAll(itemSelector).forEach(el => {
    el.addEventListener('click', () => {
      browseSession.index = parseInt(el.dataset.index, 10);
      browseSession.mode = 'single';
      renderBrowseView();
    });
  });
  document.querySelectorAll('.tile-fav-btn, .row-fav-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.index, 10);
      const card = browseSession.cards[idx];
      card.favorite = !card.favorite;
      await Store.updateCard(card);
      renderBrowseView();
    });
  });
  // Löschen-Button in der Listenzeile (öffnet Bestätigung, springt nicht in die Einzelansicht)
  document.querySelectorAll('.row-del-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.index, 10);
      confirmDeleteCard(browseSession.cards[idx]);
    });
  });
  // "Später"-Chip in Kachel/Liste: Klick hebt die Zurückstellung auf (springt
  // nicht in die Einzelansicht) — Karte kommt sofort wieder in den Algorithmus.
  document.querySelectorAll('[data-undefer]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.undefer, 10);
      undeferCard(browseSession.cards[idx]);
    });
  });
}

// Hebt die "Später"-Zurückstellung einer Karte manuell auf: nimmt sie wieder
// ganz normal in den Algorithmus auf und macht sie sofort fällig (due = jetzt),
// damit sie in der nächsten Lern-Sitzung gleich wieder drankommt. Ändert sonst
// nichts am Lernfortschritt (ease/interval/reps bleiben). Speichert direkt in
// IndexedDB — kein Neu-Import nötig, gilt für bestehende Stapel.
async function undeferCard(card) {
  if (!card || !card.deferred) return;
  card.deferred = false;
  card.due = Date.now();
  await Store.updateCard(card);
  showToast('Zurückstellung aufgehoben — Karte ist wieder im Algorithmus');
  renderBrowseView();
}

// Löscht eine einzelne Karte dauerhaft aus dem Stapel (IndexedDB) — nach
// Bestätigung. Der Lernfortschritt der übrigen Karten bleibt unangetastet;
// kein Neu-Import nötig. Danach wird die Karte auch aus der laufenden
// Durchsehen-Session entfernt und die Ansicht aktualisiert.
function confirmDeleteCard(card) {
  if (!card) return;
  showModal({
    title: 'Karte löschen?',
    body: 'Diese Karte wird <b>dauerhaft</b> aus dem Stapel entfernt. Der Lernfortschritt aller anderen Karten bleibt erhalten.',
    actions: [
      { label: 'Abbrechen', class: 'secondary' },
      { label: 'Löschen', class: 'primary', danger: true, onClick: async () => {
          await Store.deleteCard(card.id);
          closeModal();
          const b = browseSession;
          if (!b) { renderHome(); return; }
          const idx = b.cards.indexOf(card);
          if (idx !== -1) b.cards.splice(idx, 1);
          if (b.cards.length === 0) {
            showToast('Karte gelöscht — Stapel ist jetzt leer');
            browseSession = null;
            renderHome();
            return;
          }
          if (b.index >= b.cards.length) b.index = b.cards.length - 1;
          showToast('Karte gelöscht');
          renderBrowseView();
        } }
    ]
  });
}

function renderBrowseGridView() {
  const b = browseSession;
  const tilesHtml = b.cards.map((card, i) => {
    const p = getCardPreview(card);
    return `
      <div class="card-tile" data-index="${i}">

        ${p.imgSrc ? `<div class="card-tile-img" style="background-image:url('${p.imgSrc}')"></div>` : ''}
        <div class="card-tile-text">${escapeHtml(p.text.slice(0, 90))}</div>
      </div>`;
  }).join('');

  app.innerHTML = `
    ${browseHeaderHtml('grid')}
    <main>
      <div class="card-grid">${tilesHtml}</div>
    </main>
  `;

  wireCardPreviewInteractions('.card-tile');
}

function renderBrowseListView() {
  const b = browseSession;

        ${card.deferred ? `<button class="row-defer-badge" data-undefer="${i}" title="Zurückstellung aufheben — Karte wieder in den Algorithmus">Später ✕</button>` : ''}
        <span class="card-row-text">${escapeHtml(p.text.slice(0, 100))}</span>

}

function renderBrowseSingleView() {
  const b = browseSession;

  });
  document.getElementById('browse-prev').addEventListener('click', () => {

    const now = Date.now();
    if (now - lastTap < 350) toggleCardFace();
    lastTap = now;
  });

}

async function rateCard(q) {
  const s = currentSession;
  if (!s || !s.current) return;
  const card = s.current;

  const wasNew = !card.firstReviewDone;
  const wasPlanned = s.plannedIds.has(card.id);
  card.firstReviewDone = true;

  const res = scheduleCard(card, q);
  await Store.updateCard(card);

  if (wasNew) {
    s.deck.newIntroducedToday = (s.deck.newIntroducedToday || 0) + 1;
    await Store.updateDeck(s.deck);
  }

  s.studiedIds.add(card.id);
  if (q === 1) s.againCount += 1; else s.goodOrBetterCount += 1;
  if (q >= 4) s.masteredIds.add(card.id); else s.masteredIds.delete(card.id);

  // Die Karte wurde beim Anzeigen aus den Pools entfernt. Bleibt sie in der
  // Lernphase, kommt sie mit ihrer neuen due zurück in die Warteschlange;
  // sonst ist sie auf Tage geplant und verlässt die Sitzung.
  if (res.learning) s.learning.push(card);

  // Sind jetzt alle aktiven Karten gekonnt, evtl. zurückgestellte freigeben.
  releaseIfReady(s);

  s.current = null;
  renderStudyView();
}

// "Später"-Button: Karte fürs Erste zurückstellen. Sie verschwindet aus der
// Sitzung und kommt (frühestens ab der nächsten Sitzung) erst wieder, wenn alle
// anderen Karten mindestens einmal Gut/Leicht bewertet wurden. Ändert NICHT
// ease/interval/due — der Lernfortschritt der Karte bleibt unangetastet.
async function deferCard() {
  const s = currentSession;
  if (!s || !s.current) return;
  const card = s.current;

  card.deferred = true;
  await Store.updateCard(card);

  const ai = s.activeCards.indexOf(card);
  if (ai !== -1) s.activeCards.splice(ai, 1);
  s.plannedIds.delete(card.id);
  s.masteredIds.delete(card.id);
  s.deferredThisSession.add(card.id);
  s.deferredPool.push(card);
  s.deferredCount += 1;

  s.current = null;
  renderStudyView();
}

// Entfernt eine Karte vollständig aus der laufenden Lern-Sitzung (alle Pools und
// Zähler-Sets), z.B. nach dem Löschen. Verändert die DB NICHT.
function removeCardFromSession(s, card) {
  removeFromPools(s, card);
  [s.deferredPool, s.activeCards].forEach(arr => {
    const i = arr.indexOf(card);
    if (i !== -1) arr.splice(i, 1);
  });
  s.plannedIds.delete(card.id);
  s.masteredIds.delete(card.id);
  s.studiedIds.delete(card.id);
  s.deferredThisSession.delete(card.id);
}

// Löscht die aktuell in der Lern-Sitzung angezeigte Karte dauerhaft (nach
// Bestätigung) — direkt im Algorithmus, ohne Umweg über "Durchsehen". Der
// Lernfortschritt aller anderen Karten bleibt erhalten; kein Neu-Import nötig.
function confirmDeleteCurrentStudyCard() {
  const s = currentSession;
  if (!s || !s.current) return;
  const card = s.current;
  showModal({
    title: 'Karte löschen?',
    body: 'Diese Karte wird <b>dauerhaft</b> aus dem Stapel entfernt. Der Lernfortschritt aller anderen Karten bleibt erhalten.',
    actions: [
      { label: 'Abbrechen', class: 'secondary' },
      { label: 'Löschen', class: 'primary', danger: true, onClick: async () => {
          await Store.deleteCard(card.id);
          closeModal();
          removeCardFromSession(s, card);
          s.current = null;
          showToast('Karte gelöscht');
          renderStudyView();
        } }
    ]
  });
}

function renderSessionSummary() {
  const s = currentSession;
  const canAhead = s && s.aheadPool && s.aheadPool.length > 0;
  app.innerHTML = `
    <header class="topbar"><h1>Sitzung beendet</h1></header>
    <main>
      <div class="session-summary">
        <div class="emoji-big">🎉</div>
        <h2>Gut gemacht!</h2>
        <div class="stat-row">
          <div class="stat"><span class="num">${s.studiedIds.size}</span><span class="label">Karten gelernt</span></div>
          <div class="stat"><span class="num">${s.againCount}</span><span class="label">Nochmal</span></div>
          ${s.deferredCount ? `<div class="stat"><span class="num">${s.deferredCount}</span><span class="label">Zurückgestellt</span></div>` : ''}
        </div>
        ${canAhead ? `<button class="primary" id="study-ahead" style="margin-bottom:12px">Weiter vorauslernen (${s.aheadPool.length})</button>` : ''}
        <button class="${canAhead ? 'secondary' : 'primary'}" id="back-home">Zurück zur Übersicht</button>
      </div>
    </main>
  `;
  if (canAhead) {
    document.getElementById('study-ahead').addEventListener('click', () => {
      s.studyAheadActive = true;
      s.current = null;
      renderStudyView();
    });
  }
  document.getElementById('back-home').addEventListener('click', () => {
    currentSession = null;
    renderHome();
  });
}

/* ---------------------------------------------------------------------
   Start
   --------------------------------------------------------------------- */
renderHome();
</script>
